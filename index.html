<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daylight Duration in New York (2024)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <canvas id="daylightChart"></canvas>

    <script>
        async function fetchDaylightData() {
            const location = { lat: 40.7128, lng: -74.0060 }; // New York City
            const labels = [];
            const daylightHours = [];

            for (let month = 1; month <= 12; month++) {
                let date = 2024-${month.toString().padStart(2, '0')}-15; // Mid-month
                let url = https://api.sunrisesunset.io/json?lat=${location.lat}&lng=${location.lng}&date=${date};

                try {
                    let response = await fetch(url);
                    let data = await response.json();
                    if (data.results) {
                        let sunrise = new Date(2024-${month}-15T${data.results.sunrise}Z);
                        let sunset = new Date(2024-${month}-15T${data.results.sunset}Z);

                        let duration = (sunset - sunrise) / (1000 * 60 * 60); // Convert ms to hours
                        daylightHours.push(duration.toFixed(2));
                        labels.push(date);
                    }
                } catch (error) {
                    console.error("Error fetching data:", error);
                }
            }

            drawChart(labels, daylightHours);
        }

        function drawChart(labels, data) {
            const ctx = document.getElementById('daylightChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Daylight Duration (hours)',
                        data: data,
                        borderColor: 'blue',
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        fetchDaylightData();
    </script>
    <script src="cript.js"></script>
</body>
</html>
