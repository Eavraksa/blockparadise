<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Arial&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;font-family:Arial, Helvetica, sans-serif;}
body{margin:0;background:#cfe9f6;}
.site{min-height:100vh;width:100%;padding:24px 48px;}

.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:fixed;
  top:0;left:0;width:100%;
  background:#cfe9f6;
  padding:10px 40px;
  z-index:1000;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
.site{padding:100px 48px 24px;}
.left{display:flex;align-items:center;gap:12px;}
.logo{width:52px;height:52px;background:white;border-radius:14px;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:24px;}
.welcome{background:white;padding:8px 16px;border-radius:20px;font-size:14px;}
.nav{display:flex;align-items:center;}
.nav a,.cart-btn{
  text-decoration:none;font-size:14px;color:#333;
  margin-left:12px;padding:8px 16px;border-radius:20px;
  background:white;display:inline-block;transition:0.2s;border:none;cursor:pointer;font-weight:bold;
}
.nav a:hover,.cart-btn:hover{background:#f0f0f0;transform:translateY(-2px);box-shadow:0 4px 10px rgba(0,0,0,0.08);}

.banners{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:26px;}
.banner{height:160px;border-radius:20px;overflow:hidden;}
.banner img{width:100%;height:100%;object-fit:cover;}

/* ── FIXED: section title & label ── */
.section-title{
  text-align:center;
  margin:36px 0 8px;
  font-size:24px;
  font-weight:800;
  color:#1a1a1a;
  letter-spacing:-0.3px;
  position:relative;
}
.section-title::after{
  content:'';
  display:block;
  width:48px;height:3px;
  background:linear-gradient(90deg,#4CAF50,#81d4fa);
  border-radius:2px;
  margin:8px auto 0;
}

.label{
  font-size:15px;
  font-weight:700;
  color:#333;
  margin:22px 0 14px;
  display:flex;
  align-items:center;
  gap:8px;
}
.label::before{
  content:'';
  display:inline-block;
  width:4px;height:18px;
  background:#4CAF50;
  border-radius:2px;
}

/* ── FIXED: product grid ── */
.products{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:14px;
  margin-bottom:10px;
}

/* ── FIXED: card ── */
.card{
  background:white;
  border-radius:16px;
  padding:10px;
  text-align:center;
  cursor:pointer;
  transition:transform 0.2s,box-shadow 0.2s;
  border:1.5px solid transparent;
}
.card:hover{
  transform:translateY(-5px);
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
  border-color:#d0ecd0;
}

.image{height:110px;border-radius:12px;overflow:hidden;margin-bottom:8px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:2.6rem;}
.image img{width:100%;height:100%;object-fit:cover;}

.name{font-size:13px;font-weight:600;margin-bottom:5px;color:#222;line-height:1.3;}
.price{
  background:#eef7ee;
  color:#388e3c;
  border-radius:12px;
  font-size:12px;
  font-weight:700;
  padding:3px 10px;
  display:inline-block;
  margin-bottom:8px;
}

/* ── FIXED: button row ── */
.btn-row{display:flex;gap:6px;margin-top:6px;}
.btn-add,.btn-buy{
  flex:1;padding:7px 4px;border:none;border-radius:10px;
  cursor:pointer;font-size:12px;font-weight:600;transition:0.18s;
}
.btn-add{background:#f0f0f0;color:#444;}
.btn-add:hover{background:#e0e0e0;}
.btn-buy{background:#4CAF50;color:white;}
.btn-buy:hover{background:#43a047;}

/* Blind box card style */
#blindList .image{
  background:linear-gradient(135deg,#e8d5f5,#d5e8f5);
  font-size:2.8rem;
}
#blindList .price{background:#f3eeff;color:#7c3aed;}
#blindList .btn-buy{background:#7c3aed;}
#blindList .btn-buy:hover{background:#6d28d9;}
#blindList .card:hover{border-color:#d8c5f5;}

@media(max-width:1200px){.products{grid-template-columns:repeat(4,1fr);}}
@media(max-width:768px){.products{grid-template-columns:repeat(3,1fr);}}
@media(max-width:500px){.products{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<div class="site">
  <header class="header">
    <div class="left">
      <div class="logo">🧸</div>
      <div class="welcome">Welcome back! 👋</div>
    </div>
    <nav class="nav">
      <a href="#">Home</a>
      <a href="#menu">Shop</a>
      <a href="#">About</a>
      <button class="cart-btn">🛒 Cart (0)</button>
    </nav>
  </header>

  <div class="banners">
    <div class="banner" style="background:linear-gradient(135deg,#a8e063,#56ab2f);display:flex;align-items:center;justify-content:center;color:white;font-size:1.4rem;font-weight:bold;">🌿 Spring Collection</div>
    <div class="banner" style="background:linear-gradient(135deg,#89f7fe,#66a6ff);display:flex;align-items:center;justify-content:center;color:white;font-size:1.4rem;font-weight:bold;">✨ Mystery Drops</div>
  </div>

  <h2 class="section-title">Our Products</h2>

  <h3 class="label" id="menu">Block Paradise</h3>
  <section class="products" id="blockList"></section>

  <h3 class="label">Blind Box</h3>
  <section class="products" id="blindList"></section>
</div>

<script>
const blocks = [
  {name:"Classic City Set", price:"$24.99", emoji:"🏙️"},
  {name:"Forest Village", price:"$18.50", emoji:"🌲"},
  {name:"Space Station", price:"$32.00", emoji:"🚀"},
  {name:"Ocean Explorer", price:"$21.00", emoji:"🐳"},
  {name:"Dino World", price:"$19.99", emoji:"🦕"},
  {name:"Castle Kit", price:"$27.00", emoji:"🏰"},
];
const blinds = [
  {name:"Mystery Series 01", price:"$9.99", emoji:"🎁"},
  {name:"Mystery Series 02", price:"$9.99", emoji:"🎁"},
  {name:"Rare Edition", price:"$14.99", emoji:"🌟"},
  {name:"Mystery Series 03", price:"$9.99", emoji:"🎁"},
  {name:"Limited Drop", price:"$12.99", emoji:"💜"},
  {name:"Secret Figure", price:"$11.99", emoji:"🎁"},
];

function makeCard(item){
  const d = document.createElement('div');
  d.className='card';
  d.innerHTML=`
    <div class="image">${item.emoji}</div>
    <div class="name">${item.name}</div>
    <div class="price">${item.price}</div>
    <div class="btn-row">
      <button class="btn-add">+ Cart</button>
      <button class="btn-buy">Buy Now</button>
    </div>`;
  return d;
}

blocks.forEach(i=>document.getElementById('blockList').appendChild(makeCard(i)));
blinds.forEach(i=>document.getElementById('blindList').appendChild(makeCard(i)));
</script>
</body>
</html>
