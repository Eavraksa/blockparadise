<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Block Paradise</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
margin:0;
background:#cfe9f6;
}

.site{
min-height:100vh;
width:100%;
padding:24px 48px;
}

/* HEADER */

.header{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:20px;
}

.left{
display:flex;
align-items:center;
gap:12px;
}

.logo{
width:72px;
height:72px;
background:white;
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.logo img{
width:100%;
height:100%;
object-fit:contain;
}

.welcome{
background:white;
padding:8px 16px;
border-radius:20px;
font-size:14px;
}

.nav a{
text-decoration:none;
font-size:14px;
color:#333;
margin-left:18px;
}

/* BANNERS */

.banners{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:26px;
}

.banner{
height:160px;
border-radius:20px;
overflow:hidden;
}

.banner img{
width:100%;
height:100%;
object-fit:cover;
}

/* TITLES */

.section-title{
text-align:center;
margin:30px 0 16px;
font-size:22px;
font-weight:bold;
}

.label{
font-size:18px;
margin:18px 0 12px;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:18px;
}

.card{
background:white;
border-radius:16px;
padding:10px;
text-align:center;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.image{
height:120px;
border-radius:12px;
overflow:hidden;
margin-bottom:8px;
}

.image img{
width:100%;
height:100%;
object-fit:cover;
}

.name{
font-size:14px;
margin-bottom:6px;
}

.price{
background:#f2f2f2;
border-radius:12px;
font-size:13px;
padding:4px 10px;
display:inline-block;
}

/* RESPONSIVE */

@media(max-width:1200px){
.products{
grid-template-columns:repeat(4,1fr);
}
}

@media(max-width:768px){
.products{
grid-template-columns:repeat(3,1fr);
}
}

@media(max-width:500px){
.products{
grid-template-columns:repeat(2,1fr);
}
}

</style>
</head>

<body>

<div class="site">

<!-- HEADER -->

<div class="header">

<div class="left">
<div class="logo">
<img src="logo.png">
</div>

<div class="welcome">
Welcome to Block Paradise
</div>
</div>

<nav class="nav">
<a href="#">Menu</a>
<a href="#">Location</a>
<a href="#">Log in</a>
</nav>

</div>

<!-- BANNERS -->

<section class="banners">

<div class="banner">
<img src="b.jpg">
</div>

<div class="banner">
<img src="block.jpg">
</div>

</section>

<h2 class="section-title">Our products</h2>

<h3 class="label">Block paradise</h3>
<section class="products" id="blockList"></section>

<h3 class="label">Blind Box</h3>
<section class="products" id="blindList"></section>

</div>

<script>

/* BLOCK PRODUCTS */

const blockProducts = [

{name:"Flower Block 1", price:8, img:"f1.jpg"},
{name:"Flower Block 2", price:8, img:"f2.jpg"},
{name:"Flower Block 3", price:8, img:"f3.jpg"},
{name:"Flower Block 4", price:8, img:"f4.jpg"},
{name:"Flower Block 5", price:9, img:"f5.jpg"},
{name:"Flower Block 6", price:9, img:"f6.jpg"},
{name:"Flower Block 7", price:8, img:"f7.jpg"},
{name:"Flower Block 8", price:8, img:"f8.jpg"},
{name:"Flower Block 9", price:8, img:"f9.jpg"},
{name:"Flower Block 10", price:8, img:"f10.jpg"},
{name:"Flower Block 11", price:9, img:"f11.jpg"},
{name:"Flower Block 12", price:9, img:"f12.jpg"}



];

/* BLIND BOX */

const blindProducts = [

{name:"Blind Box 1", price:12, img:"bb1.jpg"},
{name:"Blind Box 2", price:12, img:"bb2.jpg"},
{name:"Blind Box 3", price:8, img:"bb3.jpg"},
{name:"Blind Box 4", price:8, img:"bb4.jpg"},
{name:"Blind Box 1", price:12, img:"bb1.jpg"},
{name:"Blind Box 2", price:12, img:"bb2.jpg"},
{name:"Blind Box 3", price:8, img:"bb3.jpg"},
{name:"Blind Box 4", price:8, img:"bb4.jpg"}


];

/* RENDER FUNCTION */

function render(list,id){

const box=document.getElementById(id);

box.innerHTML="";

list.forEach(p=>{

const card=document.createElement("div");

card.className="card";

card.innerHTML=`

<div class="image">
<img src="${p.img}">
</div>

<div class="name">${p.name}</div>

<div class="price">$${p.price}</div>

`;

card.addEventListener("click",()=>{

alert(p.name + " added to cart");

});

box.appendChild(card);

});

}

render(blockProducts,"blockList");
render(blindProducts,"blindList");

</script>

</body>
</html>
