<!DOCTYPE html>
<html>
<head>
<title>Flowchart</title>
<style>
body {
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background-color: #f0f0f0; /* Light grey background */
}

.container {
  position: relative;
  width: 400px; /* Adjust as needed */
  padding: 20px;
  background-color: #fff; /* White background for the flowchart area */
  border-radius: 8px; /* Rounded corners */
  box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); /* Subtle shadow */
}

.node {
  position: relative;
  background-color: #4682B4; /* Steel Blue */
  color: white;
  padding: 10px 15px;
  text-align: center;
  border-radius: 5px;
  margin-bottom: 30px; /* Space between nodes */
  z-index: 1; /* Ensure nodes stay above arrows */
}

.node.start, .node.end {
  background-color: #f05050; /* Reddish color for start/end */
  border-radius: 25px; /* Rounded ends */
}

.node.decision {
  background-color: #3CB371; /* Medium Sea Green */
  width: auto;
  display: inline-block;
  transform: rotate(45deg);
  margin-left: auto;
  margin-rightw: auto;
}

.node.decision span {
  display: block;
  transform: rotate(-45deg);
  padding: 10px 20px;
}

.arrow {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 5px;
  background-color: #4682B4;
  height: 40px; /* Adjust arrow length  */
  z-index: 0;
}

.line {
  position: absolute;
  border-bottom: 5px solid #708090; /* Dark Slate Gray */
  z-index: 0;
}


/* Arrows for decision node */
.arrow.decision-yes {
  left:50%;
  bottom: -20px;
  width: 5px;
  height: 40px;
  background-color: #4682B4;
   z-index: 0;
}

.arrow.decision-no {
  top: -13px;
  transform:translateX(-360%) rotate(90deg);
  width: 5px;
  height: 60px;
  background-color: #4682B4;
  z-index: 0;
}

.line.back {
    top: -28px;
    left: 50%;
    width: 70px;
    height: 5px;

    transform: translateX(-260%) rotate(0deg);
}

/*Line for back to start */

/* Arrow head styling */
.arrow:after {
  content: '';
  position: absolute;
  top: 0;
  left: -5px; /* Adjust for arrow width */
  border-width: 5px;
  border-style: solid;
  border-color: transparent transparent #4682B4 transparent;
  transform: translateY(-100%);
}

.node:last-child {
  margin-bottom: 0;
}


</style>
</head>
<body>

<div class="container">
  <div class="node start">Start</div>

  <div class="arrow"></div>
  <div class="node">Enter Username, Password</div>


  <div class="arrow"></div>
  <div class="node decision"><span>Is Username and Password correct?</span>
      <div class="arrow decision-yes"></div>
  </div>
  <div class="arrow decision-no"></div>
  <div class="line back"></div>

  <div class="node">Text Based Security</div>
  <div class="arrow"></div>
  <div class="node">Folder Based Security</div>
    <div class="arrow"></div>
  <div class="node">File Based Security</div>
    <div class="arrow"></div>
  <div class="node">FileIntegrity Based Security</div>
  <div class="arrow"></div>
    <div class="node">ProcessBased Security</div>

 <div class="arrow"></div>
  <div class="node end">End</div>

</div>

</body>
</html>
