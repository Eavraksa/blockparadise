/* General Styles */
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background-color: #f4f4f4;
    color: #333;
    line-height: 1.6;
}

/* Header Banner */
header.banner {
    height: 350px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;

    /* 3 layered background images */
    background-image: 
        url('bg BP.jpg'),
        url('bgg.jpg'),
        url('bggr.jpg');

    background-size: cover, cover, cover;
    background-position: center, center, center;
    background-repeat: no-repeat;
    position: relative;
}

.banner::after {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.35);
    z-index: 1;
}

.banner * {
    z-index: 2;
    position: relative;
}

header h1 {
    margin: 0;
    font-size: 3rem;
}

/* Navigation */
nav ul {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
}

nav ul li {
    margin-left: 1rem;
}

nav ul li:first-child {
    margin-left: 0;
}

nav ul li a {
    color: white;
    text-decoration: none;
    padding: 0.6rem 1.2rem;
    border-radius: 8px;
    background-color: #8B4513;
    transition: 0.3s ease;
}

nav ul li a:hover {
    background-color: #A0522D;
}

}
