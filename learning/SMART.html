<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smartphones Hub</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Smartphones Hub</h1>
    <nav>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Products</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="intro">
      <h2>Welcome to Smartphones Hub</h2>
      <p>Explore the latest smartphones, their features, and reviews.</p>
    </section>

    <section class="products">
      <h2>Top Smartphones</h2>
      <div id="product-container" class="product-grid"></div>
    </section>

    <section id="details" class="hidden">
      <h3 id="phone-name"></h3>
      <p><strong>Brand:</strong> <span id="phone-brand"></span></p>
      <p id="phone-desc"></p>
      <button onclick="hideDetails()">Close</button>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Smartphones Hub. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
