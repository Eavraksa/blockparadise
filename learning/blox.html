<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Paradise</title>
    <style>
        /* General Styles */
        
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333; /* Added a default text color */
            line-height: 1.6; /* Improves readability */
        }

        /* Header Styles */
        header {
               background: linear-gradient(135deg, #6f4e37, #8B4513);
               color: white;
               padding: 2rem 1rem; /* Use rem for relative sizing */
               text-align: center;
               display: flex;
               justify-content: space-between;
               align-items: center;
               box-shadow: 0 0.25rem 0.375rem rgba(0, 0, 0, 0.1); /* Use rem for shadow */
           }

        header h1 {
            margin: 0;
            font-size: 2.5rem; /* Increased font size */
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            border-radius: 30px;
        }

        nav ul li {
            margin-left: 1.25rem; /* Use rem for spacing */
        }

        nav ul li:first-child {
            margin-left: 0;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem; /* Use rem for padding */
            border-radius: 0.3125rem; /* Use rem for border-radius */
            background-color: #8B4513;
            transition: background-color 0.3s ease;
        }

        nav ul li a:hover {
            background-color: #A0522D;
        }

        /* Main Content Styles */
        main {
            padding: 1.25rem; /* Use rem for padding */
        }

        .products, .cart {
            padding: 1.25rem; /* Use rem for padding */
            margin-bottom: 1.25rem; /* Add some spacing */
        }

        .product-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); /* Responsive Grid */
            gap: 1.25rem; /* Use rem for spacing */
            justify-content: center;
        }

        .product {
            background-color: white;
            padding: 1rem; /* Use rem for padding */
            border: 1px solid #ddd;
            border-radius: 0.3125rem; /* Rounded corners */
            text-align: center;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.05); /* Use rem for shadow */
            transition: transform 0.2s ease-in-out;
        }

        .product:hover {
            transform: scale(1.05);
        }

        .product img {
            max-width: 100%;
            height: 200px; /* Fixed height for consistent product cards */
            object-fit: cover; /* Maintain aspect ratio and cover the container */
            border-radius: 0.3125rem; /* Match the product card's border-radius */
            margin-bottom: 0.5rem; /* Add spacing below the image */
        }

        .product h3 {
            margin: 0.5rem 0;
            font-size: 1.2rem;
        }

        .product p {
            margin: 0.25rem 0;
            font-size: 1rem;
            color: #777; /* Subdued price color */
        }

        .product button {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 0.75rem 1.5rem; /* Use rem for padding */
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 1rem;
            margin-top: 0.75rem; /* Use rem for spacing */
            cursor: pointer;
            border-radius: 0.3125rem; /* Use rem for border-radius */
            transition: background-color 0.3s ease;
        }

        .product button:hover {
            background-color: #367C39;
        }

        /* Banner Styles */
          .banner {
              background: url('bg BP.jpg') no-repeat center;
              text-align: center;
              padding: 5rem 1rem; /* Use rem for padding */
              position: relative; /* For pseudo-element overlay */
              overflow: hidden; /* Hide overflowing pseudo-element */
            
          }

          .banner::before {
              background: url('bgg.jpg') no-repeat;
              padding: 5rem 1rem; /* Use rem for padding */
              position: relative; /* For pseudo-element overlay */
              overflow: hidden; /* Hide overflowing pseudo-element */
              content: '';
              position: absolute;
              top: 0;
              left: 0;
              width: 100%;
              height: 100%;
              background-color: rgba(0, 0, 0, 0.3); /* Semi-transparent overlay */
              z-index: 1; /* Ensure overlay is on top of the image */
          }
           .banner::before {
              background: url('bggr.jpg') no-repeat end;
              padding: 5rem 1rem; /* Use rem for padding */
              position: relative; /* For pseudo-element overlay */
              overflow: hidden; /* Hide overflowing pseudo-element */
              content: '';
              position: absolute;
              top: 100;
              left: 100;
              width: 100%;
              height: 100%;
              background-color: rgba(0, 0, 0, 0.3); /* Semi-transparent overlay */
              z-index: 1; /* Ensure overlay is on top of the image */}
          .banner * {
              position: relative; /* Enable text/content to be above pseudo-element */
              z-index: 2;
          }
        /* New Product Styles */
        .product.new {
            border: 2px solid #4CAF50;
        }

        /* Cart Styles */
        .cart h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        #cart-list {
            list-style: none;
            padding: 0;
        }

        #cart-list li {
            padding: 0.5rem;
            border-bottom: 1px solid #eee;
        }

        #cart-list li:last-child {
            border-bottom: none;
        }

        .cart p {
            font-size: 1.2rem;
            margin-top: 1rem;
        }

        .pay-button {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 0.75rem 1.5rem; /* Use rem for padding */
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 1rem;
            margin-top: 1.25rem; /* Use rem for spacing */
            cursor: pointer;
            border-radius: 0.3125rem; /* Use rem for border-radius */
            transition: background-color 0.3s ease;
        }

        .pay-button:hover {
            background-color: #367C39;
        }

        /* Footer Styles */
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 0.625rem; /* Use rem for padding */
            font-size: 0.875rem; /* Smaller text for the footer */
        }

        /* Media Queries for Responsiveness */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: center;
            }

            nav ul {
                margin-top: 1rem;
                flex-direction: column;
                align-items: center;
            }

            nav ul li {
                margin-left: 0;
                margin-bottom: 0.5rem;
                border-radius: 30px;
            }

            .banner {
                padding: 5rem 1rem;
            }

            .product-list {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); /* Smaller product cards on smaller screens */
            }
        }

    </style>
</head>

        <h2>Shopping Cart</h2>

        <p>Total: $<span id="total">0.00</span></p>
        <button class="pay-button" onclick="payMoney()">Pay Now</button>

<footer>
    <p>&copy; 2025 Java Coffee. All rights reserved.</p>
</footer>

<script>
    let cart = [];
    let total = 0;
    
    function addToCart(item, price) {
        cart.push({ item, price });
        total += price;

        const cartList = document.getElementById("cart-list");
        const listItem = document.createElement("li");
        listItem.textContent = `${item} - $${price.toFixed(2)}`;
        cartList.appendChild(listItem);

        document.getElementById("total").textContent = total.toFixed(2);
    }

    function payMoney() {
        if (cart.length === 0) {
            alert("Your cart is empty. Please add items before paying.");
            return;
        }

        alert(`Thank you for your purchase! Total amount paid: $${total.toFixed(2)}`);
        // Reset the cart after payment
        cart = [];
        total = 0;
        document.getElementById("cart-list").innerHTML = "0"; // Clear the cart display
        document.getElementById("total").textContent = "0.00"; // Reset the total display
    }

</script>
