<!DOCTYPE html>
<html>
<head>
  <title>Grade Checker</title>
</head>
<body>
  <h2>Check Your Grade</h2>

  <label for="scoreInput">Enter your score:</label>
  <input type="number" id="scoreInput">
  <button onclick="checkGrade()">Check Grade</button>

  <p id="gradeResult"></p>

  <script>
    function checkGrade() {
      let score = document.getElementById("scoreInput").value;
      let result = document.getElementById("gradeResult");

      if (score >= 90) {
        result.textContent = "Grade: A";
      } else if (score >= 80) {
        result.textContent = "Grade: B";
      } else if (score>= 75 ){
        result.textContent = "Grade : C+";
      }
      else if (score >= 70){
        result.textContent = "Grade: C";
      } else if(score >=60){
        result.textContent = "Grade: D";
      }
      else {
        result.textContent = "Grade: F"; 
      }
    }
  </script>
</body>
</html>
